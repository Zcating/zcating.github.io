<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打丧尸：装备加强版</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #111;
      user-select: none;
      font-family: sans-serif;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      pointer-events: none;
      text-shadow: 2px 2px 0 #000;
      z-index: 10;
    }

    .weapon-status {
      margin-top: 10px;
      font-size: 16px;
      color: #ccc;
    }

    #overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      text-align: center;
      background: rgba(0, 0, 0, 0.85);
      padding: 40px;
      border-radius: 10px;
      z-index: 20;
      min-width: 250px;
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      font-size: 18px;
      cursor: pointer;
      background: #00d2ff;
      border: none;
      color: #000;
      font-weight: bold;
      border-radius: 5px;
    }

    button:hover {
      background: #fff;
    }
  </style>
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>

<body>

  <div id="ui">
    生命值: <span id="hp" style="color:#0f0">100</span>%<br>
    得分: <span id="score">0</span>
    <div class="weapon-status">当前武器: <span id="weaponName" style="color:#fff">普通手枪</span></div>
  </div>

  <div id="overlay">
    <h2 id="statusText">资源加载中...</h2>
    <div id="loadingTips" style="font-size:12px; color:#aaa; margin-top:10px;">
      <span style="color:#ff3333">■ 急救包</span> &nbsp;
      <span style="color:#00d2ff">◆ 加特林</span> &nbsp;
      <span style="color:#ffff00">▲ 霰弹枪</span>
    </div>
    <button id="restartBtn" style="display:none;" onclick="location.reload()">再玩一次</button>
  </div>

  <script>
    window.addEventListener('load', function () {
      if (typeof THREE === 'undefined') {
        document.getElementById('statusText').innerText = "加载失败！";
        return;
      }
      document.getElementById('overlay').style.display = 'none';
      initGame();
    });

    function initGame() {
      const CONFIG = {
        playerSpeed: 0.9,
        zombieSpeed: 0.35,
        zombieMaxForce: 0.05,
        spawnRate: 60,
        itemSpawnRate: 300, // 每300帧(约5秒)尝试生成一个物品
        separationDist: 3,
        bulletSpeed: 2.2,
        camHeight: 80,
        camDist: 45
      };

      let score = 0;
      let health = 100;
      let isGameOver = false;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a1a);
      scene.fog = new THREE.Fog(0x1a1a1a, 60, 200);

      const gridHelper = new THREE.GridHelper(200, 50, 0x444444, 0x333333);
      scene.add(gridHelper);

      const planeGeo = new THREE.PlaneGeometry(300, 300);
      const planeMat = new THREE.MeshBasicMaterial({ visible: false });
      const groundPlane = new THREE.Mesh(planeGeo, planeMat);
      groundPlane.rotation.x = -Math.PI / 2;
      scene.add(groundPlane);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(50, 100, 50);
      dirLight.castShadow = true;
      scene.add(dirLight);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, CONFIG.camHeight, CONFIG.camDist);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      // --- 武器系统状态 ---
      const weaponState = {
        type: 'pistol', // pistol, machinegun, shotgun
        timer: 0,       // 特殊武器剩余时间
        cooldown: 0,    // 射击冷却
        maxCooldown: 15 // 默认射速
      };

      // --- 玩家类 ---
      class Player {
        constructor() {
          const geo = new THREE.BoxGeometry(2, 2, 2);
          this.mat = new THREE.MeshLambertMaterial({ color: 0x0088ff });
          this.mesh = new THREE.Mesh(geo, this.mat);
          this.mesh.position.y = 1;
          this.mesh.castShadow = true;

          // 枪口
          const gunGeo = new THREE.BoxGeometry(0.5, 0.5, 2.5);
          this.gunMat = new THREE.MeshBasicMaterial({ color: 0x111 });
          this.gunMesh = new THREE.Mesh(gunGeo, this.gunMat);
          this.gunMesh.position.set(0.8, 0, 1.5);
          this.mesh.add(this.gunMesh);

          scene.add(this.mesh);
          this.velocity = new THREE.Vector3();
        }

        update(keys, mouseTarget) {
          if (isGameOver) return;

          this.velocity.set(0, 0, 0);
          if (keys['w']) this.velocity.z = -CONFIG.playerSpeed;
          if (keys['s']) this.velocity.z = CONFIG.playerSpeed;
          if (keys['a']) this.velocity.x = -CONFIG.playerSpeed;
          if (keys['d']) this.velocity.x = CONFIG.playerSpeed;

          this.mesh.position.add(this.velocity);

          const limit = 95;
          this.mesh.position.x = Math.max(-limit, Math.min(limit, this.mesh.position.x));
          this.mesh.position.z = Math.max(-limit, Math.min(limit, this.mesh.position.z));

          if (mouseTarget) {
            this.mesh.lookAt(mouseTarget.x, 1, mouseTarget.z);
          }

          const targetCamPos = this.mesh.position.clone().add(new THREE.Vector3(0, CONFIG.camHeight, CONFIG.camDist));
          camera.position.lerp(targetCamPos, 0.15);
          camera.lookAt(this.mesh.position);
        }
      }

      // --- 物品类 (新功能) ---
      class Item {
        constructor() {
          // 随机类型: 0-急救包, 1-加特林, 2-霰弹枪
          const rand = Math.random();
          if (rand < 0.4) this.type = 'health';
          else if (rand < 0.7) this.type = 'machinegun';
          else this.type = 'shotgun';

          // 随机位置
          const x = (Math.random() - 0.5) * 160;
          const z = (Math.random() - 0.5) * 160;
          this.position = new THREE.Vector3(x, 1.5, z);

          let geo, mat;
          if (this.type === 'health') {
            // 红十字盒子
            geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            mat = new THREE.MeshLambertMaterial({ color: 0xff0000, emissive: 0x330000 });
          } else if (this.type === 'machinegun') {
            // 蓝色八面体
            geo = new THREE.OctahedronGeometry(1);
            mat = new THREE.MeshLambertMaterial({ color: 0x00d2ff, emissive: 0x0044aa });
          } else {
            // 黄色四面体
            geo = new THREE.TetrahedronGeometry(1.2);
            mat = new THREE.MeshLambertMaterial({ color: 0xffff00, emissive: 0x555500 });
          }

          this.mesh = new THREE.Mesh(geo, mat);
          this.mesh.position.copy(this.position);
          scene.add(this.mesh);
        }

        update() {
          // 旋转动画
          this.mesh.rotation.y += 0.03;
          this.mesh.rotation.x += 0.02;
          // 浮动动画
          this.mesh.position.y = 1.5 + Math.sin(Date.now() * 0.003) * 0.3;
        }
      }

      // --- 丧尸类 ---
      class Zombie {
        constructor() {
          const angle = Math.random() * Math.PI * 2;
          const radius = 90 + Math.random() * 30;
          const x = Math.cos(angle) * radius;
          const z = Math.sin(angle) * radius;

          this.position = new THREE.Vector3(x, 1, z);
          this.velocity = new THREE.Vector3();
          this.acceleration = new THREE.Vector3();

          const geo = new THREE.ConeGeometry(1, 2.5, 8);
          geo.rotateX(Math.PI / 2);
          const mat = new THREE.MeshLambertMaterial({ color: 0x00ff00 });
          this.mesh = new THREE.Mesh(geo, mat);
          this.mesh.position.copy(this.position);
          this.mesh.castShadow = true;
          scene.add(this.mesh);
        }

        applyBehaviors(zombies, playerPos) {
          let separate = this.separate(zombies);
          let seek = this.seek(playerPos);
          separate.multiplyScalar(2.5);
          seek.multiplyScalar(1.0);
          this.acceleration.add(separate);
          this.acceleration.add(seek);
        }

        seek(target) {
          let desired = new THREE.Vector3().subVectors(target, this.position);
          desired.normalize();
          desired.multiplyScalar(CONFIG.zombieSpeed);
          let steer = new THREE.Vector3().subVectors(desired, this.velocity);
          steer.clampLength(0, CONFIG.zombieMaxForce);
          return steer;
        }

        separate(zombies) {
          let sum = new THREE.Vector3();
          let count = 0;
          for (let other of zombies) {
            if (other === this) continue;
            let d = this.position.distanceTo(other.position);
            if (d > 0 && d < CONFIG.separationDist) {
              let diff = new THREE.Vector3().subVectors(this.position, other.position);
              diff.normalize();
              diff.divideScalar(d);
              sum.add(diff);
              count++;
            }
          }
          if (count > 0) {
            sum.divideScalar(count);
            sum.normalize();
            sum.multiplyScalar(CONFIG.zombieSpeed);
            sum.sub(this.velocity);
            sum.clampLength(0, CONFIG.zombieMaxForce);
          }
          return sum;
        }

        update() {
          this.velocity.add(this.acceleration);
          this.velocity.clampLength(0, CONFIG.zombieSpeed);
          this.position.add(this.velocity);
          this.acceleration.set(0, 0, 0);
          this.mesh.position.copy(this.position);
          const lookTarget = this.position.clone().add(this.velocity);
          this.mesh.lookAt(lookTarget);
        }
      }

      // --- 子弹类 ---
      class Bullet {
        constructor(position, direction) {
          this.position = position.clone();
          this.velocity = direction.clone().normalize().multiplyScalar(CONFIG.bulletSpeed);

          // 子弹颜色根据武器改变
          let color = 0xffff00;
          let size = 0.3;
          if (weaponState.type === 'machinegun') { color = 0x00d2ff; size = 0.25; }
          if (weaponState.type === 'shotgun') { color = 0xffaa00; size = 0.25; }

          const geo = new THREE.SphereGeometry(size, 4, 4);
          const mat = new THREE.MeshBasicMaterial({ color: color });
          this.mesh = new THREE.Mesh(geo, mat);
          this.mesh.position.copy(this.position);
          scene.add(this.mesh);

          this.alive = true;
          this.life = 80;
        }

        update() {
          this.position.add(this.velocity);
          this.mesh.position.copy(this.position);
          this.life--;
          if (this.life <= 0) this.alive = false;
        }
      }

      const player = new Player();
      const zombies = [];
      const bullets = [];
      const items = []; // 物品列表
      const keys = {};
      const mouse = new THREE.Vector2();
      const raycaster = new THREE.Raycaster();
      let mouseTarget = new THREE.Vector3();
      let isMouseDown = false;

      window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
      window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
      window.addEventListener('mousemove', e => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      });
      // 改为按住鼠标逻辑
      window.addEventListener('mousedown', () => isMouseDown = true);
      window.addEventListener('mouseup', () => isMouseDown = false);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      let frameCount = 0;

      // --- 射击逻辑函数 ---
      function fireWeapon() {
        if (weaponState.cooldown > 0) return;

        const origin = player.mesh.position.clone();

        // 基础方向
        const baseDir = new THREE.Vector3().subVectors(mouseTarget, origin);
        baseDir.y = 0;
        baseDir.normalize();

        if (weaponState.type === 'shotgun') {
          // 霰弹枪：发射 5 发扇形子弹
          for (let i = -2; i <= 2; i++) {
            const dir = baseDir.clone();
            // 向量旋转算法 (简易版 2D 旋转)
            const angle = i * 0.15; // 扩散角度
            const x = dir.x * Math.cos(angle) - dir.z * Math.sin(angle);
            const z = dir.x * Math.sin(angle) + dir.z * Math.cos(angle);
            dir.set(x, 0, z);
            bullets.push(new Bullet(origin, dir));
          }
          weaponState.cooldown = 45; // 霰弹枪冷却慢
        } else {
          // 普通枪 或 加特林
          bullets.push(new Bullet(origin, baseDir));

          if (weaponState.type === 'machinegun') {
            weaponState.cooldown = 4; // 极快射速
          } else {
            weaponState.cooldown = 15; // 普通射速
          }
        }
      }

      // --- 更新 UI ---
      function updateUI() {
        const weaponNameEl = document.getElementById('weaponName');
        if (weaponState.type === 'pistol') {
          weaponNameEl.innerText = '普通手枪';
          weaponNameEl.style.color = '#fff';
        } else if (weaponState.type === 'machinegun') {
          weaponNameEl.innerText = `加特林 (${Math.ceil(weaponState.timer / 60)}s)`;
          weaponNameEl.style.color = '#00d2ff';
        } else if (weaponState.type === 'shotgun') {
          weaponNameEl.innerText = `霰弹枪 (${Math.ceil(weaponState.timer / 60)}s)`;
          weaponNameEl.style.color = '#ffff00';
        }

        const hpEl = document.getElementById('hp');
        hpEl.innerText = health;
        hpEl.style.color = health < 30 ? 'red' : '#0f0';
      }

      // --- 主循环 ---
      function animate() {
        requestAnimationFrame(animate);

        if (isGameOver) return;
        frameCount++;

        // 1. 处理武器冷却与计时
        if (weaponState.cooldown > 0) weaponState.cooldown--;

        // 特殊武器计时器倒数
        if (weaponState.type !== 'pistol') {
          weaponState.timer--;
          if (weaponState.timer <= 0) {
            weaponState.type = 'pistol'; // 恢复默认
            player.gunMat.color.setHex(0x111111); // 恢复枪身颜色
          }
        }
        updateUI();

        // 2. 鼠标射线检测
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(groundPlane);
        if (intersects.length > 0) {
          mouseTarget.copy(intersects[0].point);
        }

        // 3. 玩家更新
        player.update(keys, mouseTarget);

        // 4. 处理射击 (按住鼠标)
        if (isMouseDown) {
          fireWeapon();
        }

        // 5. 生成物品
        if (frameCount % CONFIG.itemSpawnRate === 0) {
          items.push(new Item());
        }

        // 6. 更新物品 & 拾取检测
        for (let i = items.length - 1; i >= 0; i--) {
          const item = items[i];
          item.update();

          // 拾取判断
          if (player.mesh.position.distanceTo(item.position) < 3.0) {
            // 应用效果
            if (item.type === 'health') {
              health = Math.min(100, health + 30);
            } else if (item.type === 'machinegun') {
              weaponState.type = 'machinegun';
              weaponState.timer = 600; // 10秒 (60fps)
              player.gunMat.color.setHex(0x00d2ff);
            } else if (item.type === 'shotgun') {
              weaponState.type = 'shotgun';
              weaponState.timer = 600;
              player.gunMat.color.setHex(0xffff00);
            }

            // 移除物品
            scene.remove(item.mesh);
            items.splice(i, 1);
          }
        }

        // 7. 生成丧尸
        if (frameCount % CONFIG.spawnRate === 0) {
          zombies.push(new Zombie());
          if (CONFIG.spawnRate > 10 && frameCount % 600 === 0) CONFIG.spawnRate -= 5;
        }

        // 8. 更新丧尸
        for (let i = zombies.length - 1; i >= 0; i--) {
          const z = zombies[i];
          z.applyBehaviors(zombies, player.mesh.position);
          z.update();

          if (z.position.distanceTo(player.mesh.position) < 2.0) {
            health -= 1;
            if (health <= 0) {
              isGameOver = true;
              showGameOver();
            }
          }
        }

        // 9. 更新子弹
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          b.update();

          if (!b.alive) {
            scene.remove(b.mesh);
            bullets.splice(i, 1);
            continue;
          }

          for (let j = zombies.length - 1; j >= 0; j--) {
            const z = zombies[j];
            if (b.position.distanceTo(z.position) < 2.0) {
              scene.remove(z.mesh);
              zombies.splice(j, 1);
              scene.remove(b.mesh);
              bullets.splice(i, 1);
              b.alive = false;

              score += 10;
              document.getElementById('score').innerText = score;
              break;
            }
          }
        }

        renderer.render(scene, camera);
      }

      function showGameOver() {
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'block';
        document.getElementById('statusText').innerText = "游戏结束";
        document.getElementById('statusText').style.color = "#ff3333";
        document.getElementById('loadingTips').innerHTML = `最终得分: <span style="color:#fff; font-size:24px">${score}</span>`;
        document.getElementById('restartBtn').style.display = 'inline-block';
      }

      animate();
    }
  </script>
</body>

</html>
