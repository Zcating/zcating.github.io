  <style>
    :root {
      --bg-primary: #F8F9FA;
      --bg-card: #FFFFFF;
      --text-primary: #1A1A2E;
      --text-secondary: #6B7280;
      --text-tertiary: #9CA3AF;
      --accent-red: #E74C3C;
      --accent-green: #27AE60;
      --border-light: #E5E7EB;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 24px; }

    h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 8px; }

    .update-time { font-size: 13px; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }

    /* Type Toggle */
    .type-toggle {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .type-btn {
      padding: 8px 24px;
      border: 2px solid var(--border-light);
      background: var(--bg-card);
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .type-btn:hover { border-color: var(--text-secondary); }
    .type-btn.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }

    /* Index Tabs */
    .index-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .index-tab {
      background: var(--bg-card);
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      padding: 12px 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      min-width: 120px;
      box-shadow: var(--shadow-sm);
    }

    .index-tab:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .index-tab.active { border-color: var(--text-primary); background: var(--text-primary); color: white; }
    .index-tab.active .tab-change { color: rgba(255,255,255,0.8); }

    .tab-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .tab-change { font-size: 13px; font-family: 'JetBrains Mono', monospace; font-weight: 500; }

    /* Section */
    .section { margin-bottom: 32px; }

    .section-title { font-size: 14px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; padding-left: 4px; }

    /* Stock List */
    .stock-list { background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }

    .stock-item {
      display: grid;
      grid-template-columns: 50px 100px 1fr 100px 100px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      align-items: center;
      transition: background 0.15s ease;
    }

    .stock-item:last-child { border-bottom: none; }
    .stock-item:hover { background: #FAFAFA; }
    .stock-item.header { background: #FAFAFA; font-size: 12px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }

    .stock-rank { font-weight: 600; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }
    .stock-rank.top3 { color: #FFD700; }
    .stock-code { font-family: 'JetBrains Mono', monospace; color: var(--text-secondary); font-size: 13px; }
    .stock-name { font-weight: 500; }
    .stock-price { font-family: 'JetBrains Mono', monospace; font-weight: 500; text-align: right; }
    .stock-change { font-family: 'JetBrains Mono', monospace; font-weight: 500; text-align: right; }

    .change-up { color: var(--accent-red); }
    .change-down { color: var(--accent-green); }

    .footer { text-align: center; margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border-light); color: var(--text-tertiary); font-size: 12px; }
    .footer a { color: var(--text-secondary); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .stock-item { animation: fadeIn 0.3s ease backwards; }

    @media (max-width: 640px) {
      .stock-item { grid-template-columns: 40px 80px 1fr 80px; }
      .stock-price { display: none; }
      .index-tab { min-width: 90px; padding: 10px 16px; }
    }
  </style>
</head>

      if (market === currentMarket) return;
      
      document.querySelectorAll('.index-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentMarket = market;
      renderStockList();
    });

    function updateTime() {
      const now = new Date();
      const timeStr = now.toLocaleString('zh-CN', { 
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });
      document.getElementById('updateTime').textContent = '更新于 ' + timeStr;
    }

    renderStockList();
    updateTabChanges();
    updateTime();

    setInterval(() => { location.reload(); }, 30000);
  </script>
</body>
</html>
