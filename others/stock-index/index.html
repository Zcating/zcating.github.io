<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股行情看板</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8F9FA;
            --card-bg: #FFFFFF;
            --text: #2C3E50;
            --text-light: #7F8C8D;
            --up: #E74C3C;
            --down: #27AE60;
            --border: #E1E8ED;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .subtitle {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .indices {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }
        .index-card {
            background: var(--bg);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .index-name {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 4px;
        }
        .index-price {
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            font-weight: 500;
        }
        .index-change {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            margin-top: 4px;
        }
        .up { color: var(--up); }
        .down { color: var(--down); }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            font-weight: 500;
            color: var(--text-light);
            font-size: 12px;
            text-transform: uppercase;
        }
        tr:hover { background: var(--bg); }
        .code { 
            font-family: 'JetBrains Mono', monospace; 
            color: var(--text-light);
            font-size: 12px;
        }
        .change-up { 
            color: var(--up);
            font-family: 'JetBrains Mono', monospace;
        }
        .change-down { 
            color: var(--down);
            font-family: 'JetBrains Mono', monospace;
        }
        .refresh {
            text-align: center;
            color: var(--text-light);
            font-size: 12px;
            margin-top: 20px;
        }
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .two-col { grid-template-columns: 1fr; }
            body { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 A股行情看板</h1>
        <p class="subtitle">更新时间: <span id="updateTime">加载中...</span></p>

        <!-- 股指 -->
        <div class="section">
            <div class="section-title">主要指数</div>
            <div class="indices" id="indices"></div>
        </div>

        <!-- 涨幅榜和板块 -->
        <div class="two-col">
            <!-- 涨幅榜 -->
            <div class="section">
                <div class="section-title">涨幅榜 Top 10</div>
                <table>
                    <thead>
                        <tr>
                            <th>股票</th>
                            <th>现价</th>
                            <th>涨幅</th>
                        </tr>
                    </thead>
                    <tbody id="gainers"></tbody>
                </table>
            </div>

            <!-- 板块涨跌 -->
            <div class="section">
                <div class="section-title">概念板块涨幅榜 Top 20</div>
                <table>
                    <thead>
                        <tr>
                            <th>板块</th>
                            <th>涨幅</th>
                        </tr>
                    </thead>
                    <tbody id="sectors"></tbody>
                </table>
            </div>
        </div>

        <p class="refresh">页面将每 30 秒自动刷新</p>
    </div>

    <script>
        const now = new Date();
        document.getElementById('updateTime').textContent = now.toLocaleString('zh-CN');

        // 股指数据
        const indices = [
            {name: '上证指数', price: 4124.19, change: 0.38},
            {name: '深证成指', price: 14172.63, change: 0.59},
            {name: '创业板指', price: 3229.30, change: 0.38},
            {name: '科创50', price: 1414.39, change: 0.64},
            {name: '北证50', price: 1427.35, change: 0.01}
        ];

        const indicesHtml = indices.map(i => `
            <div class="index-card">
                <div class="index-name">${i.name}</div>
                <div class="index-price">${i.price.toFixed(2)}</div>
                <div class="index-change ${i.change >= 0 ? 'up' : 'down'}">
                    ${i.change >= 0 ? '↑' : '↓'} ${Math.abs(i.change).toFixed(2)}%
                </div>
            </div>
        `).join('');
        document.getElementById('indices').innerHTML = indicesHtml;

        // 涨幅榜数据
        const gainers = [
            {code: '301680', name: 'N固德电', price: 126.71, change: 118.47},
            {code: '688176', name: '亚虹医药-U', price: 16.78, change: 20.03},
            {code: '301218', name: '华是科技', price: 38.51, change: 20.01},
            {code: '301638', name: '南网数字', price: 28.38, change: 20.00},
            {code: '301265', name: '华新环保', price: 19.80, change: 20.00},
            {code: '301205', name: '联特科技', price: 237.72, change: 20.00},
            {code: '301032', name: '新柴股份', price: 15.13, change: 19.98},
            {code: '300903', name: '科翔股份', price: 37.52, change: 17.99},
            {code: '300323', name: '华灿光电', price: 11.94, change: 16.49},
            {code: '301150', name: '中一科技', price: 49.63, change: 14.70}
        ];

        const gainersHtml = gainers.map(s => `
            <tr>
                <td><strong>${s.name}</strong><br><span class="code">${s.code}</span></td>
                <td>${s.price.toFixed(2)}</td>
                <td class="change-up">↑ ${s.change.toFixed(2)}%</td>
            </tr>
        `).join('');
        document.getElementById('gainers').innerHTML = gainersHtml;

        // 板块涨跌（概念板块）
        const sectors = [
            {name: '期货', change: 5.71},
            {name: '氮肥', change: 5.54},
            {name: '复合肥', change: 5.35},
            {name: '氯碱', change: 5.21},
            {name: '肉鸡养殖', change: 4.69},
            {name: '农化制品', change: 4.39},
            {name: '农药', change: 4.30},
            {name: '个护小家电', change: 4.18},
            {name: '养殖业', change: 4.18},
            {name: '磷肥及磷化工', change: 4.17},
            {name: '生猪养殖', change: 4.14},
            {name: '粘胶', change: 4.10},
            {name: '聚氨酯', change: 4.04},
            {name: '食品及饲料添加剂', change: 3.99},
            {name: '其他化学原料', change: 3.92},
            {name: '其他种植业', change: 3.89},
            {name: '钛白粉', change: 3.86},
            {name: '其他生物制品', change: 3.85},
            {name: '畜禽饲料', change: 3.83},
            {name: '化学原料', change: 3.71}
        ];

        const sectorsHtml = sectors.map(s => `
            <tr>
                <td>${s.name}</td>
                <td class="change-up">↑ ${s.change.toFixed(2)}%</td>
            </tr>
        `).join('');
        document.getElementById('sectors').innerHTML = sectorsHtml;

        // 自动刷新
        setTimeout(() => location.reload(), 30000);
    </script>
</body>
</html>
